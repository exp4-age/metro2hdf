name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
          - target: x86_64-macos
            os: macos-13
            archive_ext: tar.gz
          - target: aarch64-macos
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-windows-gnu
            os: windows-latest
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zig and HDF5 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zig libhdf5-dev

      - name: Install HDF5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zig hdf5
          echo "HDF5_ROOT=$(brew --prefix hdf5)" >> "$GITHUB_ENV"

      - name: Install HDF5 (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install --no-progress zig hdf5 -y
          echo "HDF5_ROOT=C:\Program Files\HDF_Group\HDF5" >> $env:GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast \
              --search-prefix "$HDF5_ROOT"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast \
              --search-prefix "$HDF5_ROOT"
          else
            zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast
          fi
